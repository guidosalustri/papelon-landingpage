baseURL = 'https://guidosalustri.github.io/papelonstudio/'
languageCode = 'en-us'
title = 'Papelon Studio'
theme = 're-terminal'

[params]
  themeColor = 'paper'
  contentTypeName = 'posts'
  showLanguageSelector = true
  logoText = 'Papelon Studio'

[languages]
  [languages.en]
    title = 'Papelon Studio'
    [languages.en.params]
      logoText = 'Papelon Studio'
      subtitle = 'A Retro Tabletop Space'
      keywords = ''
      copyright = ''
      readMore = 'Read more'
      readOtherPosts = 'Read other posts'

    # --- THE SUBMENU BAR CONFIGURATION ---
    [languages.en.menu]
      # 1. This creates the primary dropdown button
      [[languages.en.menu.main]]
        identifier = "submenus"
        name = "Sub menus"
        url = "#"
        weight = 10

      # 2. This links an item inside that dropdown using 'parent'
      [[languages.en.menu.main]]
        name = "Sub menu item 1"
        url = "/submenu1/"
        parent = "submenus"
        weight = 1

      # 3. These sit normally on the menu bar next to the dropdown
      [[languages.en.menu.main]]
        name = "About"
        url = "/about/"
        weight = 20

      [[languages.en.menu.main]]
        name = "Showcase"
        url = "/showcase/"
        weight = 30
