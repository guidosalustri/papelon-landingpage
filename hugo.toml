baseURL = 'https://guidosalustri.github.io/papelon-landingpage/'
languageCode = 'en-us'
title = 'Papelon Studio'
theme = 're-terminal'
canonifyURLs = true

[params]
  themeColor = 'paper'
  contentTypeName = 'posts'
  showLanguageSelector = true
  # Tells the theme how many menu links to show explicitly before collapsing them
  showMenuItems = 3 

# Global logo fallback config
[params.logo]
  logoText = 'Papelon Studio'
  logoHomeLink = '/papelon-landingpage/'

[languages]
  [languages.en]
    title = 'Papelon Studio'
    
    [languages.en.params]
      subtitle = 'A Retro Tabletop Space'
      keywords = ''
      copyright = ''
      readMore = 'Read more'
      readOtherPosts = 'Read other posts'
      
    # Language-specific logo override
    [languages.en.params.logo]
      logoText = 'Papelon Studio'
      logoHomeLink = '/'

    # --- THE SUBMENU BAR CONFIGURATION ---
    [languages.en.menu]
      # 1. This creates the primary parent dropdown button
      [[languages.en.menu.main]]
        identifier = "submenus"
        name = "Sub menus"
        url = "#"
        weight = 10

      # 2. This links an item inside that dropdown using 'parent'
      [[languages.en.menu.main]]
        name = "Sub menu item 1"
        url = "/submenu1/"
        parent = "submenus"
        weight = 1

      # 3. These sit normally on the menu bar next to the dropdown
      [[languages.en.menu.main]]
        name = "About"
        url = "/about/"
        weight = 20

      [[languages.en.menu.main]]
        name = "Showcase"
        url = "/showcase/"
        weight = 30
